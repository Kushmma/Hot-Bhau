<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product — BestBhau</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #f8f9fc;
            --bg-secondary: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #6c757d;
            --border-color: #e8ecf1;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --accent: #e94560;
            --accent-hover: #c73a52;
            --accent-gradient: linear-gradient(135deg, #e94560, #ff6b6b);
            --discount-bg: #e94560;
            --discount-text: #ffffff;
            --input-bg: #f1f3f5;
            --skeleton-bg: #e9ecef;
            --skeleton-shine: #f1f3f5;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
        }

        [data-theme="dark"] {
            --bg-primary: #0d0d1a;
            --bg-secondary: #141428;
            --bg-glass: rgba(20, 20, 40, 0.85);
            --bg-card: #1a1a35;
            --text-primary: #f0f0f5;
            --text-secondary: #b0b0cc;
            --text-muted: #8888aa;
            --border-color: #2a2a4a;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --input-bg: #1e1e3a;
            --skeleton-bg: #1a1a35;
            --skeleton-shine: #2a2a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            padding-top: 72px;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 8px; }

        .fw-600 { font-weight: 600; }
        .fw-700 { font-weight: 700; }
        .fw-800 { font-weight: 800; }
        .fw-900 { font-weight: 900; }
        .text-accent { color: var(--accent) !important; }
        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-accent {
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.35);
            color: #fff;
        }
        .btn-outline-accent {
            border: 2px solid var(--accent);
            color: var(--accent);
            background: transparent;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-outline-accent:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.3);
        }

        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            box-shadow: 0 8px 32px var(--shadow-color);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px var(--shadow-color);
        }

        .navbar-BestBhau {
            background: var(--bg-secondary);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1050;
            transition: background 0.3s ease;
        }
        .navbar-BestBhau .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            border-radius: 12px;
            background: var(--accent-gradient);
            box-shadow: 0 4px 14px rgba(233, 69, 96, 0.35);
            position: relative;
            overflow: hidden;
        }
        .brand-mark i { color: #fff; font-size: 1.1rem; transform: rotate(-8deg); }
        .brand-mark::after {
            content: "";
            position: absolute;
            top: -60%; left: -20%;
            width: 70%; height: 200%;
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(20deg);
        }
        .brand-wordmark {
            display: inline-flex;
            align-items: baseline;
            gap: 3px;
            font-weight: 900;
            font-size: 1.45rem;
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .brand-wordmark .dev-part {
            font-family: 'Noto Sans Devanagari', 'Inter', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-wordmark .latin-part { color: var(--text-primary); }
        .navbar-BestBhau .brand .sub {
            display: block;
            font-weight: 500;
            font-size: 0.62rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-top: 1px;
        }

        .nav-search-wrapper {
            position: relative;
            flex: 1;
            max-width: 420px;
        }
        .nav-search-wrapper .nav-search-input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .nav-search-wrapper .nav-search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.15);
        }
        .nav-search-wrapper .nav-search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .nav-link-custom {
            color: var(--text-secondary);
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .nav-link-custom:hover {
            background: rgba(233, 69, 96, 0.06);
            color: var(--accent);
        }
        .nav-link-custom.active {
            color: var(--accent);
            background: rgba(233, 69, 96, 0.06);
        }

        .theme-toggle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .theme-toggle-btn:hover {
            border-color: var(--accent);
            transform: rotate(20deg);
        }

        .footer-BestBhau {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 40px 0 24px;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            body { padding-top: 64px; }
            .navbar-BestBhau .brand-wordmark { font-size: 1.15rem; }
            .navbar-BestBhau .brand-mark { width: 32px; height: 32px; }
            .navbar-BestBhau .brand .sub { display: none; }
        }

        .product-detail-img {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            border-radius: 16px;
            background: var(--input-bg);
            padding: 20px;
        }
        .product-detail-price {
            font-size: 2.5rem;
            font-weight: 900;
        }
        .product-detail-original {
            font-size: 1.2rem;
            color: var(--text-muted);
            text-decoration: line-through;
        }
        .product-detail-discount {
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: 700;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar-BestBhau">
    <div class="container">
        <div class="d-flex align-items-center gap-3 w-100 flex-wrap">
            <a class="brand text-decoration-none text-primary" href="/">
                <span class="brand-mark"><i class="bi bi-tags-fill"></i></span>
                <span>
                    <span class="brand-wordmark"><span class="dev-part">Best</span><span class="latin-part">भाउ</span></span>
                    <span class="sub d-none d-sm-inline">Nepal's Price Comparison</span>
                </span>
            </a>

            <div class="d-flex align-items-center gap-1">
                <a href="/" class="nav-link-custom">Home</a>
                <a href="/search" class="nav-link-custom">Search</a>
                <a href="/compare" class="nav-link-custom">Compare</a>
            </div>

            <div class="nav-search-wrapper d-none d-md-block">
                <form action="/search" method="get" class="m-0">
                    <i class="bi bi-search nav-search-icon"></i>
                    <input type="text" name="q" class="nav-search-input" id="nav-search-input"
                           placeholder="Search products..." autocomplete="off">
                </form>
            </div>

            <button class="theme-toggle-btn ms-auto" id="theme-toggle" aria-label="Toggle theme">
                <i class="bi bi-moon-stars-fill"></i>
            </button>
        </div>

        <div class="d-md-none mt-2">
            <form action="/search" method="get" class="position-relative">
                <i class="bi bi-search position-absolute" style="left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted);"></i>
                <input type="text" name="q" class="nav-search-input" id="nav-search-input-mobile"
                       placeholder="Search products..." autocomplete="off" style="padding-left:40px;">
            </form>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main>
    <div class="container py-4">
        <a href="javascript:history.back()" class="btn btn-outline-accent btn-sm mb-4">
            <i class="bi bi-arrow-left"></i> Back
        </a>
        <div id="product-detail-content">
            <div class="text-center py-5">
                <div class="spinner-border text-accent" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="footer-BestBhau">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6 text-center text-md-start">
                <div class="brand">
                    <span class="brand-mark"><i class="bi bi-tags-fill"></i></span>
                    <span class="brand-wordmark"><span class="dev-part">Best</span><span class="latin-part">भाउ</span></span>
                </div>
                <p class="text-muted small mt-2 mb-0">
                    Compare prices across Nepal's top stores.
                    <br class="d-sm-none">
                    Made with ❤️ in Nepal.
                </p>
            </div>
            <div class="col-md-6 text-center text-md-end">
                <div class="d-flex gap-3 justify-content-center justify-content-md-end">
                    <a href="/" class="text-muted small">Home</a>
                    <a href="/search" class="text-muted small">Search</a>
                    <a href="/compare" class="text-muted small">Compare</a>
                </div>
                <p class="text-muted small mt-2 mb-0">
                    <i class="bi bi-database"></i> 
                    <span id="footer-product-count">0</span> products tracked
                </p>
            </div>
        </div>
    </div>
</footer>

<script>
    const PLACEHOLDER_IMG = '/static/images/placeholder.svg';

    function safeImg(url) {
        if (!url || url === 'None' || url === 'null' || url === 'undefined') return PLACEHOLDER_IMG;
        return url;
    }

    function imgFallback(el) {
        el.onerror = null;
        el.src = PLACEHOLDER_IMG;
        el.classList.add('loaded');
    }

    // Theme toggle
    document.addEventListener('DOMContentLoaded', () => {
        const root = document.documentElement;
        const toggle = document.getElementById('theme-toggle');
        const saved = localStorage.getItem('BestBhau-theme');
        if (saved) root.setAttribute('data-theme', saved);
        if (saved === 'dark') {
            toggle.querySelector('i').className = 'bi bi-sun-fill';
        }

        toggle?.addEventListener('click', () => {
            const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            localStorage.setItem('BestBhau-theme', next);
            const icon = toggle.querySelector('i');
            if (icon) icon.className = next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
        });

        fetch('/api/stats')
            .then(r => r.json())
            .then(data => {
                document.getElementById('footer-product-count').textContent = data.total_products || 0;
            })
            .catch(() => {});

        // Get product ID from URL
        const pathParts = window.location.pathname.split('/');
        const productId = pathParts[pathParts.length - 1];
        if (productId) {
            loadProductDetail(productId);
        }
    });

    function loadProductDetail(id) {
        const container = document.getElementById('product-detail-content');
        container.innerHTML = `
            <div class="text-center py-5">
                <div class="spinner-border text-accent" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>`;

        fetch(`/api/products/${id}`)
            .then(r => {
                if (!r.ok) throw new Error('Product not found');
                return r.json();
            })
            .then(p => {
                const discount = p.discount || 0;
                const price = p.price || 0;
                const originalPrice = p.original_price || p.originalPrice || 0;
                const imageUrl = safeImg(p.image_url);
                
                container.innerHTML = `
                    <div class="row g-4">
                        <div class="col-md-6">
                            <img src="${imageUrl}" 
                                 class="product-detail-img" alt="${p.name}"
                                 onerror="imgFallback(this)">
                        </div>
                        <div class="col-md-6">
                            <h2 class="fw-800">${p.name}</h2>
                            <div class="d-flex align-items-center gap-3 mt-2">
                                <span class="product-detail-price text-accent">Rs. ${price.toLocaleString()}</span>
                                ${originalPrice ? `<span class="product-detail-original">Rs. ${originalPrice.toLocaleString()}</span>` : ''}
                                ${discount > 0 ? `<span class="product-detail-discount">-${Math.round(discount)}%</span>` : ''}
                            </div>
                            
                            <div class="mt-4">
                                <div class="row g-2">
                                    <div class="col-6">
                                        <div class="p-2 rounded-2" style="background:var(--input-bg);">
                                            <small class="text-muted d-block">Store</small>
                                            <strong>${p.store || p.source || 'N/A'}</strong>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="p-2 rounded-2" style="background:var(--input-bg);">
                                            <small class="text-muted d-block">Category</small>
                                            <strong>${p.category || 'General'}</strong>
                                        </div>
                                    </div>
                                    ${p.rating ? `
                                    <div class="col-6">
                                        <div class="p-2 rounded-2" style="background:var(--input-bg);">
                                            <small class="text-muted d-block">Rating</small>
                                            <strong>${p.rating} ⭐</strong>
                                        </div>
                                    </div>` : ''}
                                    ${p.reviews ? `
                                    <div class="col-6">
                                        <div class="p-2 rounded-2" style="background:var(--input-bg);">
                                            <small class="text-muted d-block">Reviews</small>
                                            <strong>${p.reviews}</strong>
                                        </div>
                                    </div>` : ''}
                                    <div class="col-12">
                                        <div class="p-2 rounded-2" style="background:var(--input-bg);">
                                            <small class="text-muted d-block">Availability</small>
                                            <strong>${p.availability || 'In Stock'}</strong>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            ${p.product_url ? `
                            <a href="${p.product_url}" target="_blank" class="btn btn-accent mt-4 w-100">
                                <i class="bi bi-box-arrow-up-right"></i> View on ${p.store || 'Store'}
                            </a>` : ''}
                            
                            <div class="mt-3">
                                <small class="text-muted">Last updated: ${p.last_updated || 'N/A'}</small>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Price History -->
                    <div class="mt-5" id="price-history-section">
                        <h5 class="fw-700"><i class="bi bi-graph-up text-accent"></i> Price History</h5>
                        <div id="price-history-content">
                            <div class="text-center py-3">
                                <div class="spinner-border text-accent spinner-border-sm" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Load price history
                fetch(`/api/history/${id}`)
                    .then(r => r.json())
                    .then(data => {
                        const histContainer = document.getElementById('price-history-content');
                        if (!data.history || data.history.length === 0) {
                            histContainer.innerHTML = '<p class="text-muted small">No price history available</p>';
                            return;
                        }
                        
                        let html = `
                            <div class="row g-3 mb-3">
                                <div class="col-4 col-md-3">
                                    <div class="p-2 rounded-2" style="background:var(--input-bg);">
                                        <small class="text-muted d-block">Current</small>
                                        <strong>Rs. ${data.stats.current.toLocaleString()}</strong>
                                    </div>
                                </div>
                                <div class="col-4 col-md-3">
                                    <div class="p-2 rounded-2" style="background:var(--input-bg);">
                                        <small class="text-muted d-block">Lowest</small>
                                        <strong class="text-success">Rs. ${data.stats.lowest.toLocaleString()}</strong>
                                    </div>
                                </div>
                                <div class="col-4 col-md-3">
                                    <div class="p-2 rounded-2" style="background:var(--input-bg);">
                                        <small class="text-muted d-block">Highest</small>
                                        <strong class="text-danger">Rs. ${data.stats.highest.toLocaleString()}</strong>
                                    </div>
                                </div>
                                <div class="col-4 col-md-3">
                                    <div class="p-2 rounded-2" style="background:var(--input-bg);">
                                        <small class="text-muted d-block">Average</small>
                                        <strong>Rs. ${data.stats.average.toLocaleString()}</strong>
                                    </div>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead>
                                        <tr><th>Date</th><th>Price</th><th>Currency</th></tr>
                                    </thead>
                                    <tbody>
                                        ${data.history.map(h => `
                                            <tr>
                                                <td>${h.recorded_at || 'N/A'}</td>
                                                <td>Rs. ${h.price.toLocaleString()}</td>
                                                <td>${h.currency || 'NPR'}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>`;
                        histContainer.innerHTML = html;
                    })
                    .catch(() => {
                        document.getElementById('price-history-content').innerHTML = 
                            '<p class="text-muted small">Could not load price history</p>';
                    });
            })
            .catch(() => {
                container.innerHTML = `
                    <div class="text-center py-5 text-danger">
                        <i class="bi bi-exclamation-triangle fs-1 d-block mb-3"></i>
                        <h5>Product not found</h5>
                        <p class="small">The product you're looking for doesn't exist</p>
                        <a href="/" class="btn btn-outline-accent btn-sm mt-2">Go Home</a>
                    </div>`;
            });
    }
</script>

</body>
</html>
