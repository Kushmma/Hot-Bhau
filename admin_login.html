<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — HatBhau</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #f8f9fc;
            --bg-secondary: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #6c757d;
            --border-color: #e8ecf1;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --accent: #e94560;
            --accent-hover: #c73a52;
            --accent-gradient: linear-gradient(135deg, #e94560, #ff6b6b);
            --input-bg: #f1f3f5;
            --danger: #e74c3c;
        }

        [data-theme="dark"] {
            --bg-primary: #0d0d1a;
            --bg-secondary: #141428;
            --bg-glass: rgba(20, 20, 40, 0.85);
            --bg-card: #1a1a35;
            --text-primary: #f0f0f5;
            --text-secondary: #b0b0cc;
            --text-muted: #8888aa;
            --border-color: #2a2a4a;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --input-bg: #1e1e3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .fw-800 { font-weight: 800; }
        .fw-700 { font-weight: 700; }
        .text-accent { color: var(--accent) !important; }
        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-accent {
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.35);
            color: #fff;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 24px 64px var(--shadow-color);
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--accent-gradient);
            box-shadow: 0 4px 14px rgba(233, 69, 96, 0.35);
        }
        .brand-mark i { color: #fff; font-size: 1.6rem; }

        .brand-wordmark {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }
        .brand-wordmark .dev-part {
            font-family: 'Noto Sans Devanagari', 'Inter', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-wordmark .latin-part { color: var(--text-primary); }

        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 12px 16px;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: var(--accent);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 100;
        }
        .theme-toggle-btn:hover {
            border-color: var(--accent);
            transform: rotate(20deg);
        }

        @media (max-width: 576px) {
            .login-card { padding: 32px 24px; }
            .brand-wordmark { font-size: 1.4rem; }
            .brand-mark { width: 44px; height: 44px; }
            .brand-mark i { font-size: 1.3rem; }
            .theme-toggle-btn { top: 12px; right: 12px; width: 36px; height: 36px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-mark mb-3 mx-auto">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <span class="brand-wordmark">
                <span class="dev-part">हट</span><span class="latin-part">Bhau</span>
            </span>
            <h5 class="fw-700 mt-3">Admin Login</h5>
            <p class="text-muted small">Enter your credentials to access the admin panel</p>
        </div>

        {% if error %}
        <div class="error-message mb-3">
            <i class="bi bi-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/admin/login" method="POST">
            <div class="mb-3">
                <label class="form-label fw-600">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label fw-600">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-accent w-100">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/" class="back-link small">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const root = document.documentElement;
            const toggle = document.getElementById('theme-toggle');
            const saved = localStorage.getItem('hatbhau-theme');
            if (saved) root.setAttribute('data-theme', saved);
            if (saved === 'dark') {
                toggle.querySelector('i').className = 'bi bi-sun-fill';
            }

            toggle?.addEventListener('click', () => {
                const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                root.setAttribute('data-theme', next);
                localStorage.setItem('hatbhau-theme', next);
                const icon = toggle.querySelector('i');
                if (icon) icon.className = next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
            });
        });
    </script>
</body>
</html>
